name: Publish Release & Deploy to QA

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx now-sdk build

      - name: Package app
        run: npx now-sdk pack

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP=$(ls target/*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No zip found in target/"; exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  deploy-qa:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --pattern "*.zip" \
            --dir ./download

      - name: Extract and install to QA
        run: |
          ZIP=$(ls ./download/*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No zip downloaded"; exit 1
          fi
          unzip -o "$ZIP" -d ./qa_app
          npx now-sdk install --source ./qa_app
        env:
          SN_SDK_NODE_ENV: SN_SDK_CI_INSTALL
          SN_SDK_AUTH_TYPE: oauth
          SN_SDK_INSTANCE_URL: ${{ secrets.SN_QA_URL }}
          SN_SDK_OAUTH_CLIENT_ID: ${{ secrets.SN_QA_CLIENT_ID }}
          SN_SDK_OAUTH_CLIENT_SECRET: ${{ secrets.SN_QA_CLIENT_SECRET }}
