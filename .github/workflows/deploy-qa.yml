name: Deploy to QA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to deploy (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.inputs.version }}" \
            --pattern "*.zip" \
            --dir ./download

      - name: Extract and install to QA
        run: |
          ZIP=$(ls ./download/*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No zip downloaded"; exit 1
          fi
          unzip -o "$ZIP" -d ./qa_app
          npx now-sdk install --source ./qa_app
        env:
          SN_SDK_NODE_ENV: SN_SDK_CI_INSTALL
          SN_SDK_AUTH_TYPE: oauth
          SN_SDK_INSTANCE_URL: ${{ secrets.SN_QA_URL }}
          SN_SDK_OAUTH_CLIENT_ID: ${{ secrets.SN_QA_CLIENT_ID }}
          SN_SDK_OAUTH_CLIENT_SECRET: ${{ secrets.SN_QA_CLIENT_SECRET }}
